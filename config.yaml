    - "btop"
    - "gnome-disks"
    - "baobab"
    - "hardinfo"
    - "timeshift-launcher"
    - "gufw"
    - "synaptic-pkexec"
    - "mintinstall"
    - "clamtk"
    - "transmission-gtk"
    - "warpinator"
    - "balena-etcher"
