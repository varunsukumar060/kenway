kenway:
  name: "Kenway"
  owner: "Varun"
  log_file: "kenway.log"
  hotkey: "<alt>+k"

llm:
  enabled: false
  model: "qwen2.5:1.5b"
  endpoint: "http://localhost:11434/api/generate"
  timeout: 30

voice:
  rate: 165
  volume: 0.9
  voice_index: 0

browser:
  default: "google-chrome"
  youtube_base: "https://www.youtube.com/results?search_query="
  google_base: "https://www.google.com/search?q="

brightness:
  method: "sysfs"                          # amdgpu direct sysfs write
  sysfs_path: "/sys/class/backlight/amdgpu_bl1/brightness"
  sysfs_max:  "/sys/class/backlight/amdgpu_bl1/max_brightness"
  step_percent: 10                          # % change per up/down command

audio:
  method: "pactl"                           # pactl available on this system
  step_percent: 10

folders:
  desktop:   "/home/varun_sukumar/Desktop"
  documents: "/home/varun_sukumar/Documents"
  downloads: "/home/varun_sukumar/Downloads"
  music:     "/home/varun_sukumar/Music"
  pictures:  "/home/varun_sukumar/Pictures"
  videos:    "/home/varun_sukumar/Videos"
  kenway:    "/home/varun_sukumar/kenway"
  arduino:   "/home/varun_sukumar/Arduino"
  home:      "/home/varun_sukumar"

file_manager:
  allowed_read_paths:
    - "/home/varun_sukumar/Documents"
    - "/home/varun_sukumar/Desktop"
    - "/home/varun_sukumar/Downloads"
    - "/home/varun_sukumar/kenway"
    - "/home/varun_sukumar/Arduino"
  allowed_write_paths:
    - "/home/varun_sukumar/Documents"
    - "/home/varun_sukumar/Desktop"
    - "/home/varun_sukumar/Downloads"

# Auto-scanned app map: name -> executable
# Covers everything found on this Lenovo E41-25 install
apps:
  allowlist:
    # Browsers
    - "google-chrome-stable"
    - "chromium-browser"
    - "firefox"
    # Editors / IDEs
    - "code"
    - "cursor"
    - "vim"
    - "xed"
    - "mousepad"
    - "gedit"
    # File managers
    - "thunar"
    # Terminals
    - "xfce4-terminal"
    - "terminator"
    - "tilix"
    - "kitty"
    - "cool-retro-term"
    # Media
    - "vlc"
    - "mpv"
    - "celluloid"
    - "spotify"
    - "rhythmbox"
    - "audacity"
    - "obs"
    # Office / Docs
    - "libreoffice"
    - "onlyoffice-desktopeditors"
    - "xreader"
    # Dev tools
    - "arduino"
    - "kicad"
    - "librecad"
    - "qcad"
    - "virtualbox"
    - "eclipse"
    # System
